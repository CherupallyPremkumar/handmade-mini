server:
  port: ${PORT:8090}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/homebase_db_db}
    username: ${DB_USERNAME:homebase_db}
    password: ${DB_PASSWORD:homebase_db_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: homebase_db
        format_sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: homebase_db

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

  jackson:
    default-property-inclusion: non_null

# Cloudflare R2 (S3-compatible) image storage
cloudflare:
  r2:
    account-id: ${CF_ACCOUNT_ID:not-configured}
    access-key: ${CF_R2_ACCESS_KEY:not-configured}
    secret-key: ${CF_R2_SECRET_KEY:not-configured}
    bucket: ${CF_R2_BUCKET:homebase_db-images}
    public-domain: ${CF_R2_PUBLIC_DOMAIN:localhost}

# Razorpay configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}

# JWT Authentication
app:
  jwt-secret: ${JWT_SECRET}
  frontend-url: ${FRONTEND_URL:https://dhanunjaiah.com}
  cors-origins: ${CORS_ORIGINS}

# Logging
logging:
  level:
    com.homebase_db: INFO
    org.hibernate.SQL: WARN

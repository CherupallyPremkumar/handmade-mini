server:
  port: ${PORT:8090}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/pochampally_db}
    username: ${DB_USERNAME:pochampally}
    password: ${DB_PASSWORD:pochampally_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: pochampally
        format_sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: pochampally

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

  jackson:
    default-property-inclusion: non_null

# Cloudflare R2 (S3-compatible) image storage
cloudflare:
  r2:
    account-id: ${CF_ACCOUNT_ID:not-configured}
    access-key: ${CF_R2_ACCESS_KEY:not-configured}
    secret-key: ${CF_R2_SECRET_KEY:not-configured}
    bucket: ${CF_R2_BUCKET:pochampally-images}
    public-domain: ${CF_R2_PUBLIC_DOMAIN:localhost}

# Razorpay configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_SZgTibLDyK3Gg8}
  key-secret: ${RAZORPAY_KEY_SECRET:fr52RaE1ZSZa35a5Ca2a1Mx0}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:change-this-in-production}

# JWT Authentication
app:
  jwt-secret: ${JWT_SECRET:dhanunjaiah-handlooms-local-dev-only-key-2026-not-for-production}

# Logging
logging:
  level:
    com.pochampally: INFO
    org.hibernate.SQL: WARN
